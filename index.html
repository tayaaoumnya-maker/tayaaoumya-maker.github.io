<!DOCTYPE html>
<html>
<head>
    <title>Mon super site</title>
    <style>
        body {
            background-color: #f0f4ff;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 100px;
        }

        h1 {
            color: #4a4aff;
            font-size: 40px;
        }

        p {
            font-size: 20px;
            color: #333;
        }

        button {
            background-color: #4a4aff;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }

        button:hover {
            background-color: #2f2fd6;
        }
    </style>
</head>

<body>
    <h1>Bienvenue sur mon site 🚀</h1>
    <p>Maintenant il est stylé 😎</p>

    <button onclick="alert('Bravo tu apprends le code ! 🎉')">
        Clique-moi
    </button>
</body>
</html>
